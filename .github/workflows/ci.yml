name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://ceverse:ceverse@localhost:5432/ceverse?schema=public
      DIRECT_URL: postgresql://ceverse:ceverse@localhost:5432/ceverse?schema=public
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key-not-a-secret
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key-not-a-secret
      NODE_ENV: test
      # Avoid interactive prompts / optional peer noise in CI
      CI: true
      HUSKY: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Show environment
        run: |
          node -v
          npm -v
          ls -la package.json package-lock.json

      - name: Install dependencies
        run: |
          set -e
          echo "Installing with npm ci..."
          if ! npm ci --no-audit --no-fund; then
            echo "::warning::npm ci failed — falling back to npm install"
            npm install --no-audit --no-fund
          fi

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Dependency audit (high+)
        run: npm run audit:deps
        # Do not fail CI solely on advisory lag for moderate/transitive issues
        continue-on-error: true
